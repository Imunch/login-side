<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log ind</title>
<style>
  :root{
    --green:#00a082; --green-dark:#007a63; --bg:#0c1a18; --panel:#15302d;
    --panel2:#1c3b37; --line:#27524c; --accent:#ffce3a; --good:#3ddc97;
    --bad:#ff6b6b; --ink:#eafaf6; --muted:#8fb3ac;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(900px 500px at 50% -10%, #1d3f3a 0%, var(--bg) 60%);
    color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:20px;-webkit-font-smoothing:antialiased;line-height:1.5;
  }
  .card{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:22px;padding:36px 32px;
    width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.45);
    animation:rise .45s cubic-bezier(.2,.9,.3,1.1);
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .brand{text-align:center;margin-bottom:24px}
  .logo{
    width:56px;height:56px;border-radius:16px;margin:0 auto 12px;
    background:linear-gradient(135deg,var(--green),var(--green-dark));
    display:flex;align-items:center;justify-content:center;font-size:28px;
    box-shadow:0 8px 22px rgba(0,160,130,.4);
  }
  h1{font-size:23px;font-weight:800;margin-bottom:4px}
  .sub{color:var(--muted);font-size:14px}

  form{margin-top:8px}
  .field{margin-bottom:16px}
  label{display:block;font-size:13px;font-weight:600;color:#cfeae3;margin-bottom:6px}
  .input-wrap{position:relative}
  input[type=text],input[type=password]{
    width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;
    font-size:15px;font-family:inherit;background:#0a1413;color:var(--ink);transition:.15s;
  }
  input::placeholder{color:#557068}
  input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,160,130,.18)}
  .field.error input{border-color:var(--bad);box-shadow:0 0 0 3px rgba(255,107,107,.14)}
  .toggle{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;
    color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;padding:6px 10px;border-radius:8px;
  }
  .toggle:hover{color:var(--ink);background:rgba(255,255,255,.05)}
  .err-msg{color:var(--bad);font-size:12.5px;margin-top:5px;display:none}
  .field.error .err-msg{display:block}

  .row{display:flex;align-items:center;justify-content:space-between;margin:4px 0 20px;font-size:13.5px}
  .remember{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;color:#cfeae3}
  .remember input{position:absolute;opacity:0;width:0;height:0}
  .box{width:18px;height:18px;border:2px solid var(--line);border-radius:5px;display:flex;
    align-items:center;justify-content:center;font-size:11px;color:#0c1a18;font-weight:800;transition:.15s}
  .remember input:checked + .box{background:var(--green);border-color:var(--green)}
  .link{color:var(--green);text-decoration:none;font-weight:600}
  .link:hover{text-decoration:underline}

  .btn{
    width:100%;background:var(--green);color:#fff;border:none;padding:14px;border-radius:12px;
    font-weight:800;font-size:15.5px;cursor:pointer;transition:.15s;font-family:inherit;
  }
  .btn:hover{background:var(--green-dark);transform:translateY(-1px)}
  .btn:active{transform:translateY(1px)}
  .btn.loading{opacity:.7;pointer-events:none}

  .divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--muted);font-size:12.5px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .alt{display:flex;gap:10px}
  .alt button{
    flex:1;background:#0a1413;border:1px solid var(--line);color:#cfeae3;padding:11px;border-radius:11px;
    cursor:pointer;font-size:13.5px;font-weight:600;font-family:inherit;transition:.15s;
    display:flex;align-items:center;justify-content:center;gap:7px;
  }
  .alt button:hover{border-color:var(--accent);color:#fff}

  .foot{text-align:center;margin-top:22px;font-size:13.5px;color:var(--muted)}

  .banner{
    display:none;margin-bottom:18px;padding:11px 14px;border-radius:11px;font-size:13.5px;
    background:rgba(61,220,151,.12);border:1px solid var(--good);color:var(--good);
  }
  .banner.show{display:block;animation:rise .3s}

  .note{text-align:center;margin-top:18px;font-size:11.5px;color:#557068}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">🔐</div>
      <h1>Velkommen tilbage</h1>
      <div class="sub">Log ind på din konto</div>
    </div>

    <div class="banner" id="banner">✓ Logget ind! (demo)</div>

    <form id="loginForm" novalidate>
      <div class="field" id="fUser">
        <label for="username">Brugernavn</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="dit brugernavn" autocomplete="username">
        </div>
        <div class="err-msg">Indtast dit brugernavn.</div>
      </div>

      <div class="field" id="fPass">
        <label for="password">Kodeord</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle" id="toggle">Vis</button>
        </div>
        <div class="err-msg">Indtast dit kodeord.</div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" id="remember">
          <span class="box">✓</span>
          Husk mig
        </label>
        <a href="#" class="link" id="forgot">Glemt kodeord?</a>
      </div>

      <button type="submit" class="btn" id="submit">Log ind</button>
    </form>

    <div class="divider">eller</div>
    <div class="alt">
      <button type="button">Google</button>
      <button type="button">Microsoft</button>
    </div>

    <div class="foot">Har du ikke en konto? <a href="#" class="link">Opret dig</a></div>
    <div class="note">Demo-side — der gemmes eller sendes ingen data.</div>
  </div>

<script>
  const form=document.getElementById('loginForm');
  const user=document.getElementById('username');
  const pass=document.getElementById('password');
  const fUser=document.getElementById('fUser');
  const fPass=document.getElementById('fPass');
  const toggle=document.getElementById('toggle');
  const submit=document.getElementById('submit');
  const banner=document.getElementById('banner');

  toggle.addEventListener('click',()=>{
    const show=pass.type==='password';
    pass.type=show?'text':'password';
    toggle.textContent=show?'Skjul':'Vis';
  });

  [user,pass].forEach(el=>el.addEventListener('input',()=>{
    el.closest('.field').classList.remove('error');
  }));

  form.addEventListener('submit',e=>{
    e.preventDefault();
    let ok=true;
    if(!user.value.trim()){fUser.classList.add('error');ok=false;}
    if(!pass.value){fPass.classList.add('error');ok=false;}
    if(!ok) return;

    submit.classList.add('loading');
    submit.textContent='Logger ind…';
    setTimeout(()=>{
      submit.classList.remove('loading');
      submit.textContent='Log ind';
      banner.classList.add('show');
      banner.scrollIntoView({behavior:'smooth',block:'center'});
    },900);
  });

  document.getElementById('forgot').addEventListener('click',e=>{
    e.preventDefault();
    alert('I en rigtig app ville dette sende et nulstillingslink. (Demo)');
  });
</script>
</body>
</html>
